<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Central de Monitoramento TI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080C14;
    color: #DDE6F0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }

  /* Painel esquerdo */
  .panel-left {
    flex: 1;
    background: linear-gradient(145deg, #0D1B2E 0%, #0F2040 50%, #0A1628 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    position: relative;
    overflow: hidden;
  }

  .panel-left::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(31,111,235,.15) 0%, transparent 70%);
    top: -100px; left: -100px;
  }
  .panel-left::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(77,159,255,.1) 0%, transparent 70%);
    bottom: -80px; right: -80px;
  }

  /* Grid decorativo */
  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(31,111,235,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,111,235,.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .left-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 400px;
  }

  /* Logo */
  .logo-wrapper {
    margin-bottom: 40px;
  }

  .logo-svg {
    width: 120px;
    height: 120px;
    margin: 0 auto 20px;
    display: block;
    filter: drop-shadow(0 0 30px rgba(31,111,235,.4));
  }

  .logo-title {
    font-size: 28px;
    font-weight: 700;
    color: #DDE6F0;
    letter-spacing: -.5px;
    margin-bottom: 6px;
  }

  .logo-title span {
    color: #4D9FFF;
  }

  .logo-sub {
    font-size: 13px;
    color: #4A6A8A;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* Stats decorativos */
  .stats-row {
    display: flex;
    gap: 24px;
    margin-top: 60px;
    justify-content: center;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: #4D9FFF;
  }

  .stat-lbl {
    font-size: 11px;
    color: #4A6A8A;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .stat-divider {
    width: 1px;
    background: #1E2D4A;
    align-self: stretch;
  }

  /* Painel direito - formulário */
  .panel-right {
    width: 440px;
    min-width: 440px;
    background: #0A0F1C;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    border-left: 1px solid #1E2D4A;
    position: relative;
  }

  .form-header {
    width: 100%;
    margin-bottom: 36px;
  }

  .form-header h2 {
    font-size: 22px;
    font-weight: 700;
    color: #DDE6F0;
    margin-bottom: 6px;
  }

  .form-header p {
    font-size: 13px;
    color: #4A6A8A;
  }

  .field {
    width: 100%;
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #7A9ABF;
    margin-bottom: 7px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #4A6A8A;
    font-size: 16px;
    pointer-events: none;
  }

  input {
    width: 100%;
    background: #0F1629;
    border: 1px solid #1E2D4A;
    border-radius: 10px;
    color: #DDE6F0;
    font-size: 14px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  input:focus {
    border-color: #1F6FEB;
    box-shadow: 0 0 0 3px rgba(31,111,235,.15);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #1F6FEB 0%, #1558C8 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: all .2s;
    letter-spacing: .03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover:not(:disabled) {
    background: linear-gradient(135deg, #3A85F5 0%, #1F6FEB 100%);
    box-shadow: 0 4px 20px rgba(31,111,235,.4);
    transform: translateY(-1px);
  }

  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

  .erro {
    background: rgba(200,40,40,.1);
    border: 1px solid rgba(200,40,40,.3);
    color: #F26060;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
    width: 100%;
    text-align: center;
  }

  .footer-text {
    position: absolute;
    bottom: 24px;
    font-size: 11px;
    color: #2A3F5F;
  }

  /* Responsivo */
  @media (max-width: 700px) {
    .panel-left { display: none; }
    .panel-right { width: 100%; min-width: unset; border-left: none; }
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

<!-- Painel esquerdo -->
<div class="panel-left">
  <div class="grid-lines"></div>
  <div class="left-content">
    <div class="logo-wrapper">
      <!-- Logo TI em SVG -->
      <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Fundo hexagonal -->
        <polygon points="60,6 106,31 106,81 60,106 14,81 14,31" fill="#0D1B2E" stroke="#1F6FEB" stroke-width="1.5" opacity=".9"/>
        <polygon points="60,16 96,37 96,79 60,100 24,79 24,37" fill="#0F2040" stroke="#1E2D4A" stroke-width="1"/>

        <!-- Circuito impresso - linhas -->
        <line x1="36" y1="50" x2="44" y2="50" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="44" y1="50" x2="44" y2="42" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="44" y1="42" x2="52" y2="42" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="76" y1="50" x2="84" y2="50" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="76" y1="50" x2="76" y2="42" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="68" y1="42" x2="76" y2="42" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="36" y1="70" x2="44" y2="70" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="44" y1="70" x2="44" y2="78" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="44" y1="78" x2="52" y2="78" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="76" y1="70" x2="84" y2="70" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="76" y1="70" x2="76" y2="78" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>
        <line x1="68" y1="78" x2="76" y2="78" stroke="#1F6FEB" stroke-width="1.2" opacity=".6"/>

        <!-- Chip central -->
        <rect x="46" y="44" width="28" height="32" rx="3" fill="#0A1628" stroke="#4D9FFF" stroke-width="1.8"/>
        <rect x="49" y="47" width="22" height="26" rx="2" fill="rgba(31,111,235,.12)"/>

        <!-- Pinos do chip -->
        <line x1="52" y1="44" x2="52" y2="38" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="58" y1="44" x2="58" y2="38" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="64" y1="44" x2="64" y2="38" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="52" y1="76" x2="52" y2="82" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="58" y1="76" x2="58" y2="82" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="64" y1="76" x2="64" y2="82" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="46" y1="52" x2="40" y2="52" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="46" y1="58" x2="40" y2="58" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="46" y1="64" x2="40" y2="64" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="74" y1="52" x2="80" y2="52" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="74" y1="58" x2="80" y2="58" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="74" y1="64" x2="80" y2="64" stroke="#4D9FFF" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Texto TI -->
        <text x="60" y="65" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="800" font-size="16" fill="#4D9FFF" letter-spacing="1">TI</text>

        <!-- Nó de conexão brilhante -->
        <circle cx="60" cy="60" r="3" fill="#4D9FFF" opacity=".3"/>
        <circle cx="44" cy="50" r="2" fill="#4D9FFF" opacity=".7"/>
        <circle cx="76" cy="50" r="2" fill="#4D9FFF" opacity=".7"/>
        <circle cx="44" cy="70" r="2" fill="#56D364" opacity=".7"/>
        <circle cx="76" cy="70" r="2" fill="#E3B341" opacity=".7"/>
      </svg>

      <div class="logo-title">Colégio <span>SER</span></div>
      <div class="logo-sub">Central de Monitoramento TI</div>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num">24/7</div>
        <div class="stat-lbl">Monitoramento</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num">TI</div>
        <div class="stat-lbl">Suporte</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num">SER</div>
        <div class="stat-lbl">Educação</div>
      </div>
    </div>
  </div>
</div>

<!-- Painel direito -->
<div class="panel-right">
  <div class="form-header">
    <h2>Bem-vindo de volta</h2>
    <p>Acesse com suas credenciais do sistema</p>
  </div>

  <div class="field">
    <label>Email</label>
    <div class="input-wrap">
      <i class="ti ti-mail"></i>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
  </div>

  <div class="field">
    <label>Senha</label>
    <div class="input-wrap">
      <i class="ti ti-lock"></i>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>
  </div>

  <button class="btn" id="btnLogin" onclick="login()">
    <i class="ti ti-login"></i>
    Entrar
  </button>

  <div class="erro" id="erro"></div>

  <div class="footer-text">Central de Monitoramento TI · Colégio SER</div>
</div>

<script>
  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('senha').focus();
  });

  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btnLogin');
    const erro = document.getElementById('erro');

    if (!email || !senha) {
      mostrarErro('Preencha email e senha.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin .8s linear infinite"></i> Entrando…';
    erro.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/';
      } else {
        mostrarErro(data.erro || 'Erro ao fazer login.');
      }
    } catch {
      mostrarErro('Erro de conexão com o servidor.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> Entrar';
    }
  }

  function mostrarErro(msg) {
    const erro = document.getElementById('erro');
    erro.textContent = msg;
    erro.style.display = 'block';
  }
</script>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
